{% extends "base.html" %}

{% block content %}
<header class="top-header">
    <h1>Configuración Básica</h1>
</header>

<div class="settings-container glass-panel" style="max-width: 600px; padding: 24px;">
    <div class="d-flex align-center gap-3 mb-6" style="background: rgba(0,0,0,0.2); padding: 12px 16px; border-radius: var(--radius-md);">
        <i data-lucide="user" class="text-primary"></i>
        <h3 class="fw-500">Perfil de Usuario</h3>
    </div>
    
    <div class="form-group d-flex align-center gap-4">
        <i data-lucide="user" class="text-muted" style="width: 20px;"></i>
        <input type="text" class="input-neumorphic" value="{{ user.full_name if user else '' }}" disabled>
    </div>
    <div class="form-group d-flex align-center gap-4">
        <i data-lucide="mail" class="text-muted" style="width: 20px;"></i>
        <input type="email" class="input-neumorphic" value="{{ user.email if user else '' }}" disabled>
    </div>
    <div class="form-group d-flex align-center gap-4">
        <i data-lucide="lock" class="text-muted" style="width: 20px;"></i>
        <input type="password" class="input-neumorphic" value="********" disabled>
    </div>
    <div class="form-group d-flex align-center justify-between gap-4 mt-6">
        <div class="d-flex align-center gap-3">
            <i data-lucide="bell" class="text-muted" style="width: 20px;"></i>
            <span>Notificaciones activas</span>
        </div>
        <label class="switch">
            <input type="checkbox" checked>
            <span class="slider round"></span>
        </label>
    </div>
    <div class="d-flex justify-end gap-3 mt-8">
        {% if user.role in ['admin', 'manager'] %}
        <button class="btn btn-secondary d-flex align-center gap-2" onclick="window.location.href='/register'">
            <i data-lucide="user-plus" style="width: 16px;"></i> Añadir Usuario
        </button>
        {% endif %}
        <button class="btn btn-primary" onclick="logout()">Cerrar Sesión</button>
    </div>
</div>

<div class="settings-container glass-panel mt-6" style="max-width: 600px; padding: 24px;">
    <div class="d-flex align-center gap-3 mb-6" style="background: rgba(0,0,0,0.2); padding: 12px 16px; border-radius: var(--radius-md);">
        <i data-lucide="palette" class="text-warning"></i>
        <h3 class="fw-500">Personalización</h3>
    </div>
    
    <div class="form-group d-flex align-center justify-between gap-4">
        <div class="d-flex align-center gap-3">
            <i data-lucide="sun" class="text-muted" style="width: 20px;"></i>
            <span>Tema Oscuro</span>
        </div>
        <label class="switch">
            <input type="checkbox" id="theme-toggle-settings" onchange="toggleTheme()">
            <span class="slider round"></span>
        </label>
    </div>

    <div class="form-group d-flex align-center justify-between gap-4 mt-6">
        <div class="d-flex align-center gap-3">
            <i data-lucide="type" class="text-muted" style="width: 20px;"></i>
            <span>Tamaño de la Interfaz (Zoom)</span>
        </div>
        <div class="d-flex align-center gap-2">
            <button class="btn btn-secondary" onclick="changeZoom(-1)" title="Reducir tamaño" style="padding: 4px 12px;">-</button>
            <span id="zoom-level-display" class="fw-500" style="min-width: 45px; text-align: center; font-size: 0.9rem;">100%</span>
            <button class="btn btn-secondary" onclick="changeZoom(1)" title="Aumentar tamaño" style="padding: 4px 12px;">+</button>
        </div>
    </div>
</div>

<!-- Init switch state -->
<script>
    document.addEventListener("DOMContentLoaded", () => {
        let isDark = localStorage.getItem('theme') === 'dark';
        let toggle = document.getElementById('theme-toggle-settings');
        if (toggle) toggle.checked = isDark;
    });
</script>
{% endblock %}
