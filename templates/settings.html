{% extends "base.html" %}

{% block content %}
<header class="top-header">
    <h1>Configuración Básica</h1>
</header>

<div class="settings-container glass-panel" style="max-width: 600px; padding: 24px;">
    <div style="background: rgba(0,0,0,0.2); padding: 12px 16px; border-radius: var(--radius-md); margin-bottom: 24px; display: flex; align-items: center; gap: 12px;">
        <i data-lucide="user" style="color: var(--primary);"></i>
        <h3 style="font-weight: 500;">Perfil de Usuario</h3>
    </div>
    
    <div class="form-group" style="display: flex; align-items: center; gap: 16px;">
        <i data-lucide="user" style="color: var(--text-muted); width: 20px;"></i>
        <input type="text" class="input-neumorphic" value="{{ user.full_name if user else '' }}" disabled>
    </div>
    <div class="form-group" style="display: flex; align-items: center; gap: 16px;">
        <i data-lucide="mail" style="color: var(--text-muted); width: 20px;"></i>
        <input type="email" class="input-neumorphic" value="{{ user.email if user else '' }}" disabled>
    </div>
    <div class="form-group" style="display: flex; align-items: center; gap: 16px;">
        <i data-lucide="lock" style="color: var(--text-muted); width: 20px;"></i>
        <input type="password" class="input-neumorphic" value="********" disabled>
    </div>
    <div class="form-group" style="display: flex; align-items: center; gap: 16px; margin-top: 24px; justify-content: space-between;">
        <div style="display: flex; align-items: center; gap: 12px;">
            <i data-lucide="bell" style="color: var(--text-muted); width: 20px;"></i>
            <span>Notificaciones activas</span>
        </div>
        <label class="switch">
            <input type="checkbox" checked>
            <span class="slider round"></span>
        </label>
    </div>
    <div style="margin-top: 32px; display: flex; justify-content: flex-end; gap: 12px;">
        {% if user.role in ['admin', 'manager'] %}
        <button class="btn btn-secondary" onclick="window.location.href='/register'" style="display: flex; align-items: center; gap: 6px;">
            <i data-lucide="user-plus" style="width: 16px;"></i> Añadir Usuario
        </button>
        {% endif %}
        <button class="btn btn-primary" onclick="logout()">Cerrar Sesión</button>
    </div>
</div>

<div class="settings-container glass-panel" style="max-width: 600px; padding: 24px; margin-top: 24px;">
    <div style="background: rgba(0,0,0,0.2); padding: 12px 16px; border-radius: var(--radius-md); margin-bottom: 24px; display: flex; align-items: center; gap: 12px;">
        <i data-lucide="palette" style="color: var(--warning);"></i>
        <h3 style="font-weight: 500;">Personalización</h3>
    </div>
    
    <div class="form-group" style="display: flex; align-items: center; justify-content: space-between; gap: 16px;">
        <div style="display: flex; align-items: center; gap: 12px;">
            <i data-lucide="sun" style="color: var(--text-muted); width: 20px;"></i>
            <span>Tema Oscuro</span>
        </div>
        <label class="switch">
            <input type="checkbox" id="theme-toggle-settings" onchange="toggleTheme()">
            <span class="slider round"></span>
        </label>
    </div>

    <div class="form-group" style="display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-top: 24px;">
        <div style="display: flex; align-items: center; gap: 12px;">
            <i data-lucide="type" style="color: var(--text-muted); width: 20px;"></i>
            <span>Tamaño de la Interfaz (Zoom)</span>
        </div>
        <div style="display: flex; align-items: center; gap: 8px;">
            <button class="btn btn-secondary" onclick="changeZoom(-1)" title="Reducir tamaño" style="padding: 4px 12px;">-</button>
            <span id="zoom-level-display" style="min-width: 45px; text-align: center; font-weight: 500; font-size: 0.9rem;">100%</span>
            <button class="btn btn-secondary" onclick="changeZoom(1)" title="Aumentar tamaño" style="padding: 4px 12px;">+</button>
        </div>
    </div>
</div>

<!-- Init switch state -->
<script>
    document.addEventListener("DOMContentLoaded", () => {
        let isDark = localStorage.getItem('theme') === 'dark';
        let toggle = document.getElementById('theme-toggle-settings');
        if (toggle) toggle.checked = isDark;
    });
</script>
{% endblock %}
